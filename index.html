<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/cluster-headache-hub/favicon.svg" />
    <meta name="description" content="Live data from ClinicalTrials.gov and PubMed on cluster headache research, treatments, and clinical trials." />
    <meta name="theme-color" content="#1b3a6b" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cluster Headache Research Hub</title>
  </head>
  <body>
    <!-- GitHub Pages SPA redirect restore -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
